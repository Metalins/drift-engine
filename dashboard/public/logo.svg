<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="Metalins">
  <defs>
    <!-- Cuerpo: gradient diagonal claro arriba-izq → medio centro → oscuro abajo-der -->
    <linearGradient id="m-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3f4f6" />
      <stop offset="55%" stop-color="#d1d5db" />
      <stop offset="100%" stop-color="#9ca3af" />
    </linearGradient>
    <!-- Cabeza: radial subtle -->
    <radialGradient id="m-head" cx="38%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#f3f4f6" />
      <stop offset="100%" stop-color="#9ca3af" />
    </radialGradient>
    <!-- Edge sutil -->
    <linearGradient id="m-edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.05)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0)" />
    </linearGradient>
  </defs>

  <!-- Cabeza pequeña, ovalada -->
  <ellipse cx="60" cy="20" rx="9" ry="6.5" fill="url(#m-head)" />

  <!-- Cuello: rectangulito que une cabeza con cuerpo -->
  <rect x="54" y="24" width="12" height="10" rx="1.5" fill="#a3a3a3" />

  <!-- Cuerpo: rectángulo wider-than-tall con top muy redondeado, bottom ligero -->
  <path d="M 22 42 Q 22 32 32 32 L 88 32 Q 98 32 98 42 L 98 100 Q 98 105 93 105 L 27 105 Q 22 105 22 100 Z"
        fill="url(#m-body)" />

  <!-- Edge para profundidad -->
  <path d="M 22 42 Q 22 32 32 32 L 88 32 Q 98 32 98 42 L 98 100 Q 98 105 93 105 L 27 105 Q 22 105 22 100 Z"
        fill="url(#m-edge)" />

  <!-- Ojos -->
  <ellipse cx="46" cy="62" rx="4.5" ry="5.5" fill="#1f2937" />
  <ellipse cx="74" cy="62" rx="4.5" ry="5.5" fill="#1f2937" />

  <!-- Highlight muy sutil en los ojos para que se sientan vivos -->
  <ellipse cx="44.5" cy="60" rx="1.4" ry="1.6" fill="#e5e7eb" opacity="0.6" />
  <ellipse cx="72.5" cy="60" rx="1.4" ry="1.6" fill="#e5e7eb" opacity="0.6" />
</svg>
